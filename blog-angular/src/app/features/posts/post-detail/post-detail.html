@if (post()) {
  <mat-card>
    <app-post-cover [coverUrl]="post()!.cover_url" [title]="post()!.title" [seed]="post()!.id" size="detail"></app-post-cover>
    <mat-card-header>
        <mat-card-title>{{ post()!.title }}</mat-card-title>
        <mat-card-subtitle>
            <span class="category-badge">{{ post()!.category?.name }}</span>
            · {{ post()!.author_email }} · {{ post()!.created_at | date:'dd/MM/yyyy HH:mm' }}
        </mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p class="content">{{ post()!.content }}</p>
    </mat-card-content>

    @if (isAuthor()) {
      <mat-card-actions>
        <a mat-button [routerLink]="['/posts', post()!.id, 'editar']">Editar</a>
        <button mat-button color="warn" (click)="deletePost()">Excluir</button>
      </mat-card-actions>
    }
  </mat-card>
}
